<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>

  <nav style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #0f172a;
  padding: 12px 20px;
  z-index: 1000;
  border-bottom: 1px solid #1f2937;
">
  <a href="#top" style="margin-right:15px; color:#e2e8f0;">Home</a>
  <a href="#about" style="margin-right:15px; color:#e2e8f0;">About</a>
  <a href="#experience" style="margin-right:15px; color:#e2e8f0;">Experience</a>
  <a href="#projects" style="margin-right:15px; color:#e2e8f0;">Projects</a>
  <a href="#contact" style="color:#e2e8f0;">Contact</a>
</nav>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    .hero {
      padding: 60px 0;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 18px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
    }

    .tag {
      display: inline-block;
      background: #1f2937;
      padding: 5px 10px;
      border-radius: 20px;
      margin: 5px;
      font-size: 12px;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }

    section {
      margin-top: 40px;
    }

    .grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #111827;
  border: 1px solid #1f2937;
  padding: 20px;
  border-radius: 16px;
  transition: 0.2s ease;
}

.card:hover {
  transform: translateY(-5px);
  border-color: #334155;
}

.card h3 {
  margin-top: 0;
  margin-bottom: 10px;
  color: #e2e8f0;
}

.card p {
  color: #94a3b8;
  font-size: 14px;
  line-height: 1.5;
}

.tags {
  margin-top: 12px;
  font-size: 12px;
  color: #60a5fa;
}
  </style>
</head>

<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
