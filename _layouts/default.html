<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    .hero {
      padding: 60px 0;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 18px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
    }

    .tag {
      display: inline-block;
      background: #1f2937;
      padding: 5px 10px;
      border-radius: 20px;
      margin: 5px;
      font-size: 12px;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }

    section {
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
